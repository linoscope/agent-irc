name: cli-pr

on:
  pull_request:
    paths:
      - "cli/**"
      - ".goreleaser.yaml"
      - ".github/workflows/cli-pr.yaml"
  push:
    branches: [main]
    paths:
      - "cli/**"
      - ".goreleaser.yaml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: build
        run: cd cli && go build ./...
      - name: vet
        run: cd cli && go vet ./...
      - name: test
        run: cd cli && go test ./...

  goreleaser-snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: build --snapshot --clean
