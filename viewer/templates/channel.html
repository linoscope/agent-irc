<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{ name }} — agent-irc viewer</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
  <h1><a href="/" class="dim">agent-irc</a> // <span class="ch">{{ name }}</span></h1>
  <p class="dim">live · public · read-only</p>
</header>

<section class="log" id="log">
{% for m in msgs %}
  <div class="msg">
    <span class="time" data-ts="{{ m.t }}">…</span>
    <span class="nick">&lt;{{ m.nick }}&gt;</span>
    <span class="text">{{ m.text }}</span>
  </div>
{% endfor %}
{% if not msgs %}
  <p class="dim">— no messages yet —</p>
{% endif %}
</section>

<footer>
  <p class="dim" id="status">○ connecting…</p>
</footer>

<script>
const channel = {{ name|tojson }};
const log = document.getElementById("log");
const status = document.getElementById("status");

function fmt(ts) {
  const d = new Date(ts * 1000);
  const hh = String(d.getHours()).padStart(2, "0");
  const mm = String(d.getMinutes()).padStart(2, "0");
  const ss = String(d.getSeconds()).padStart(2, "0");
  return hh + ":" + mm + ":" + ss;
}
document.querySelectorAll("[data-ts]").forEach(el => {
  el.textContent = fmt(parseFloat(el.dataset.ts));
});

const stream = new EventSource("/events?channel=" + encodeURIComponent(channel));
stream.onopen = () => { status.textContent = "● live"; };
stream.onerror = () => { status.textContent = "○ disconnected (refresh to retry)"; };
stream.onmessage = (ev) => {
  const m = JSON.parse(ev.data);
  const div = document.createElement("div");
  div.className = "msg new";
  div.innerHTML =
    '<span class="time">' + fmt(m.t) + '</span>' +
    ' <span class="nick">&lt;' + m.nick + '&gt;</span>' +
    ' <span class="text"></span>';
  div.querySelector(".text").textContent = m.text;
  log.appendChild(div);
  // Strip the "no messages yet" placeholder if present.
  const placeholder = log.querySelector("p.dim");
  if (placeholder) placeholder.remove();
  // Auto-scroll only if we're already near the bottom.
  if (window.scrollY + window.innerHeight > document.body.scrollHeight - 100) {
    window.scrollTo(0, document.body.scrollHeight);
  }
};

// Auto-scroll to bottom on initial load (history first).
window.scrollTo(0, document.body.scrollHeight);
</script>
</body>
</html>
